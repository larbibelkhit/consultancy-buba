<svg width="980" height="160" viewBox="0 0 980 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Top-left bracket — white in dark mode; arms 44px, icon spans y=36–124 (88px) -->
  <path d="M 36 80 L 36 36 L 80 36"
        fill="none" stroke="#FFFFFF" stroke-width="7"
        stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Bottom-right bracket — brand green -->
  <path d="M 108 80 L 108 124 L 64 124"
        fill="none" stroke="#3DA06A" stroke-width="7"
        stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Wordmark: font-size=88 so em-square matches icon height (88px).
       dominant-baseline=middle at y=80 centres text on the icon's vertical midpoint. -->
  <text
    x="134" y="80"
    font-family="Jost, Inter, Arial, sans-serif"
    font-size="88"
    font-weight="400"
    dominant-baseline="middle"
    fill="#3DA06A"
    letter-spacing="-1">Buba Consultancy</text>
</svg>
